<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Gestion des tâches</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f6fb;
      --bg-accent: #e8eef8;
      --surface: #ffffff;
      --surface-hover: #fafbfd;
      --border: #e2e8f0;
      --border-focus: #93c5fd;
      --text: #0f172a;
      --text-secondary: #475569;
      --muted: #94a3b8;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-light: #eff6ff;
      --success: #059669;
      --success-bg: #ecfdf5;
      --warn: #d97706;
      --warn-bg: #fffbeb;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow: 0 4px 24px rgba(15, 23, 42, 0.06);
      --shadow-lg: 0 12px 40px rgba(15, 23, 42, 0.08);
      --radius: 20px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 17px;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(37, 99, 235, 0.12), transparent),
        radial-gradient(ellipse 60% 40% at 100% 0%, rgba(99, 102, 241, 0.08), transparent),
        radial-gradient(ellipse 50% 30% at 0% 100%, rgba(14, 165, 233, 0.06), transparent);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
      padding: 3rem 2.5rem 5rem;
    }

    @media (max-width: 640px) {
      .page { padding: 2rem 1.25rem 3rem; }
    }

    /* Header */
    .header {
      margin-bottom: 3rem;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 1.15rem;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
    }

    .logo-icon svg { width: 32px; height: 32px; color: white; }

    h1 {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 2.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 1.1rem;
      margin-top: 0.35rem;
    }

    .health-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 1.1rem;
      background: var(--success-bg);
      color: var(--success);
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .health-pill::before {
      content: "";
      width: 9px;
      height: 9px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.35rem;
      margin-bottom: 2.75rem;
    }

    @media (max-width: 700px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1.35rem 1.5rem;
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .stat-label {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 2.35rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-card.total .stat-value { color: var(--primary); }
    .stat-card.todo .stat-value { color: #64748b; }
    .stat-card.progress .stat-value { color: var(--warn); }
    .stat-card.done .stat-value { color: var(--success); }

    /* Layout */
    .grid {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) minmax(400px, 1.5fr);
      gap: 2rem;
      align-items: start;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem 2.25rem;
      box-shadow: var(--shadow);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 1.75rem;
    }

    .card-header h2 {
      font-size: 1.35rem;
      font-weight: 700;
    }

    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
    }

    .card-icon.add { background: var(--primary-light); }
    .card-icon.list { background: #f0fdf4; }

    /* Form */
    label {
      display: block;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    input, textarea, select {
      width: 100%;
      padding: 0.9rem 1.1rem;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 1.05rem;
      margin-bottom: 1.25rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder, textarea::placeholder { color: var(--muted); }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    textarea { min-height: 120px; resize: vertical; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.15rem; }
    .row > div { margin-bottom: 0; }
    .row input, .row select { margin-bottom: 1rem; }

    @media (max-width: 500px) { .row { grid-template-columns: 1fr; } }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      padding: 0.95rem 1.6rem;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
      color: white;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: var(--surface);
      color: var(--text-secondary);
      border: 1.5px solid var(--border);
      padding: 0.45rem 0.85rem;
      font-size: 0.82rem;
    }

    .btn-ghost:hover {
      background: var(--bg);
      border-color: var(--muted);
      color: var(--text);
    }

    .btn-success {
      background: var(--success-bg);
      color: var(--success);
      border: 1.5px solid #a7f3d0;
      padding: 0.6rem 1.1rem;
      font-size: 0.95rem;
    }

    .btn-success:hover { background: #d1fae5; }

    .btn-danger {
      background: var(--danger-bg);
      color: var(--danger);
      border: 1.5px solid #fecaca;
      padding: 0.6rem 1.1rem;
      font-size: 0.95rem;
    }

    .btn-danger:hover { background: #fee2e2; }

    /* Filters */
    .filters {
      display: flex;
      gap: 0.65rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.55rem 1.15rem;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: var(--primary); color: var(--primary); }

    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    /* Task list */
    .task-list { list-style: none; display: flex; flex-direction: column; gap: 1rem; }

    .task-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1.25rem;
      padding: 1.4rem 1.5rem;
      background: var(--surface-hover);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: all 0.2s;
      animation: fadeIn 0.35s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover {
      border-color: #cbd5e1;
      box-shadow: var(--shadow-sm);
    }

    .task-item.done-task { opacity: 0.75; }
    .task-item.done-task .task-title { text-decoration: line-through; color: var(--muted); }

    .task-title {
      font-weight: 600;
      font-size: 1.15rem;
      margin-bottom: 0.4rem;
      color: var(--text);
    }

    .task-desc {
      color: var(--text-secondary);
      font-size: 1rem;
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }

    .badges { display: flex; flex-wrap: wrap; gap: 0.5rem; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .badge.todo { background: #f1f5f9; color: #475569; }
    .badge.in_progress { background: var(--warn-bg); color: #b45309; }
    .badge.done { background: var(--success-bg); color: var(--success); }
    .badge.low { background: #f0f9ff; color: #0369a1; }
    .badge.medium { background: #faf5ff; color: #7c3aed; }
    .badge.high { background: var(--danger-bg); color: var(--danger); }

    .actions { display: flex; gap: 0.6rem; flex-shrink: 0; flex-wrap: wrap; }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    .empty-state .empty-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.25rem;
      background: var(--bg-accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.25rem;
    }

    .empty-state p { font-size: 1.05rem; }
    .empty-state strong { display: block; color: var(--text-secondary); margin-bottom: 0.35rem; font-size: 1.2rem; }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 1rem 1.5rem;
      background: var(--text);
      color: white;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { background: var(--danger); }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header-top">
        <div>
          <div class="logo-row">
            <div class="logo-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
              </svg>
            </div>
            <div>
              <h1>TaskFlow</h1>
              <p class="subtitle">Gérez vos tâches DevOps en toute simplicité</p>
            </div>
          </div>
        </div>
        <span class="health-pill">Service actif</span>
      </div>
    </header>

    <div class="stats" id="stats">
      <div class="stat-card total"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">0</div></div>
      <div class="stat-card todo"><div class="stat-label">À faire</div><div class="stat-value" id="stat-todo">0</div></div>
      <div class="stat-card progress"><div class="stat-label">En cours</div><div class="stat-value" id="stat-progress">0</div></div>
      <div class="stat-card done"><div class="stat-label">Terminées</div><div class="stat-value" id="stat-done">0</div></div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="card-header">
          <div class="card-icon add">✏️</div>
          <h2>Nouvelle tâche</h2>
        </div>
        <form id="task-form">
          <label for="title">Titre</label>
          <input id="title" name="title" required maxlength="200" placeholder="Ex. Configurer le pipeline Jenkins">

          <label for="description">Description</label>
          <textarea id="description" name="description" placeholder="Décrivez la tâche, les étapes, les livrables…"></textarea>

          <div class="row">
            <div>
              <label for="status">Statut</label>
              <select id="status" name="status">
                <option value="todo">À faire</option>
                <option value="in_progress">En cours</option>
                <option value="done">Terminé</option>
              </select>
            </div>
            <div>
              <label for="priority">Priorité</label>
              <select id="priority" name="priority">
                <option value="low">Basse</option>
                <option value="medium" selected>Moyenne</option>
                <option value="high">Haute</option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn btn-primary">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            Ajouter la tâche
          </button>
        </form>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-icon list">📋</div>
          <h2>Mes tâches</h2>
        </div>

        <div class="filters">
          <button type="button" class="filter-btn active" data-filter="all">Toutes</button>
          <button type="button" class="filter-btn" data-filter="todo">À faire</button>
          <button type="button" class="filter-btn" data-filter="in_progress">En cours</button>
          <button type="button" class="filter-btn" data-filter="done">Terminées</button>
        </div>

        <ul id="task-list" class="task-list">
          <li class="empty-state"><div class="empty-icon">⏳</div><strong>Chargement…</strong><p>Récupération de vos tâches</p></li>
        </ul>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const STATUS_LABELS = { todo: "À faire", in_progress: "En cours", done: "Terminé" };
    const PRIORITY_LABELS = { low: "Basse", medium: "Moyenne", high: "Haute" };
    let allTasks = [];
    let currentFilter = "all";

    function showToast(msg, isError = false) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = "toast show" + (isError ? " error" : "");
      setTimeout(() => t.classList.remove("show"), 2800);
    }

    function updateStats(tasks) {
      document.getElementById("stat-total").textContent = tasks.length;
      document.getElementById("stat-todo").textContent = tasks.filter(t => t.status === "todo").length;
      document.getElementById("stat-progress").textContent = tasks.filter(t => t.status === "in_progress").length;
      document.getElementById("stat-done").textContent = tasks.filter(t => t.status === "done").length;
    }

    function escapeHtml(text) {
      const d = document.createElement("div");
      d.textContent = text;
      return d.innerHTML;
    }

    function renderTasks() {
      const list = document.getElementById("task-list");
      const tasks = currentFilter === "all"
        ? allTasks
        : allTasks.filter(t => t.status === currentFilter);

      if (!tasks.length) {
        const msg = currentFilter === "all"
          ? "Créez votre première tâche pour commencer."
          : "Aucune tâche dans cette catégorie.";
        list.innerHTML = `
          <li class="empty-state">
            <div class="empty-icon">📝</div>
            <strong>Aucune tâche</strong>
            <p>${msg}</p>
          </li>`;
        return;
      }

      list.innerHTML = tasks.map(t => `
        <li class="task-item ${t.status === "done" ? "done-task" : ""}" data-id="${t.id}">
          <div>
            <div class="task-title">${escapeHtml(t.title)}</div>
            ${t.description ? `<p class="task-desc">${escapeHtml(t.description)}</p>` : ""}
            <div class="badges">
              <span class="badge ${t.status}">${STATUS_LABELS[t.status] || t.status}</span>
              <span class="badge ${t.priority}">${PRIORITY_LABELS[t.priority] || t.priority}</span>
            </div>
          </div>
          <div class="actions">
            ${t.status !== "done" ? `<button class="btn btn-success" onclick="markDone(${t.id})">✓ Terminer</button>` : ""}
            <button class="btn btn-danger" onclick="deleteTask(${t.id})">Supprimer</button>
          </div>
        </li>
      `).join("");
    }

    async function loadTasks() {
      const res = await fetch("/api/tasks");
      allTasks = await res.json();
      updateStats(allTasks);
      renderTasks();
    }

    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        renderTasks();
      });
    });

    document.getElementById("task-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = e.target;
      const res = await fetch("/api/tasks", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          title: form.title.value,
          description: form.description.value,
          status: form.status.value,
          priority: form.priority.value,
        }),
      });
      if (res.ok) {
        form.reset();
        form.priority.value = "medium";
        showToast("Tâche ajoutée avec succès");
        loadTasks();
      } else {
        const err = await res.json();
        showToast(err.error || "Erreur lors de la création", true);
      }
    });

    async function markDone(id) {
      await fetch(`/api/tasks/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: "done" }),
      });
      showToast("Tâche marquée comme terminée");
      loadTasks();
    }

    async function deleteTask(id) {
      if (!confirm("Supprimer cette tâche ?")) return;
      await fetch(`/api/tasks/${id}`, { method: "DELETE" });
      showToast("Tâche supprimée");
      loadTasks();
    }

    loadTasks();
  </script>
</body>
</html>
